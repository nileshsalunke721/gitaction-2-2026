name: Pipeline

on:
    push:
        branches: [ main ]

jobs:
    extraction-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3

            - name: install dependencies
              run: pip install -r requirements.txt
        
            
            - name: run extraction
              run: python extract.py

    transform-jobs:
        runs-on: ubuntu-latest
        needs: extraction-jobs
        steps:
            - name: checkout code
              uses: actions/checkout@v3


            - name: run transform
              run: python transform.py

    load-jobs:
        runs-on: ubuntu-latest
        needs: transform-jobs
        steps:
            - name: checkout code
              uses: actions/checkout@v3

            - name: run load
              run: python load.py