name: Pipeline

on:
    push:
        branches: [ main ]

jobs:
    extraction-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            
            - name: set up python
              uses: actions/setup-python@v4
              with:
                    python-version: 3.10
            
            - name: run extraction
              run: python extract.py